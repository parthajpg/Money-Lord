<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Destiny - Lord Shiva</title>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* 
         * GLOBAL STYLES & RESET 
         * Ensuring clean typography and resetting default browser margins 
         */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        /* 
         * BACKGROUND & LAYOUT 
         * Dark, spiritual aesthetic using a smooth CSS gradient 
         */
        body {
            /* Deep navy blue (#0f172a) blending into mystical indigo/purple (#1e1b4b) */
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            overflow-x: hidden;
        }

        /* 
         * INSTRUCTIONS PANEL 
         * Glassmorphism effect: Semi-transparent card 
         */
        .instructions-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2.5rem;
            max-width: 650px;
            width: 100%;
            margin-bottom: 3rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: transform 0.3s ease;
        }

        .instructions-panel:hover {
            transform: translateY(-5px);
        }

        .instructions-panel h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            /* Golden accent color for the title */
            color: #fbbf24;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(251, 191, 36, 0.3);
        }

        .instructions-panel p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            color: #cbd5e1;
            font-weight: 300;
        }

        .instructions-list {
            text-align: left;
            margin-bottom: 2rem;
            padding-left: 1.5rem;
            color: #e2e8f0;
            display: inline-block;
        }

        .instructions-list li {
            margin-bottom: 0.75rem;
            font-size: 1.05rem;
            padding-left: 0.5rem;
        }
        
        .instructions-list li::marker {
            color: #fbbf24;
            font-weight: bold;
        }

        /* 
         * COLOR SELECTION DROPDOWN 
         */
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-group label {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fbbf24;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .color-select {
            padding: 0.85rem 2rem;
            font-size: 1.05rem;
            border-radius: 10px;
            border: 2px solid rgba(251, 191, 36, 0.5);
            background-color: rgba(15, 23, 42, 0.8);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            min-width: 250px;
            appearance: none; /* Custom arrow will be added if needed, sticking to simple for now */
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23fbbf24%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 1rem top 50%;
            background-size: 0.65rem auto;
        }

        .color-select:focus, .color-select:hover {
            border-color: #fbbf24;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
            background-color: rgba(30, 27, 75, 0.9);
        }

        .color-select option {
            background-color: #0f172a;
            color: #fff;
            padding: 10px;
        }

        /* 
         * SHIVA IMAGE ACTION 
         * Image Effects: Golden border, rounded corners, subtle glowing box-shadow 
         */
        .shiva-image-container {
            position: relative;
            display: inline-block;
            margin-top: 1rem;
        }

        .shiva-image {
            width: 100%;
            max-width: 350px;
            height: auto;
            border-radius: 20px;
            border: 4px solid #fbbf24;
            /* Glowing box-shadow */
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.4), 0 0 60px rgba(251, 191, 36, 0.2);
            /* Smooth transition for hover effect */
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            cursor: pointer;
            object-fit: cover;
            aspect-ratio: 3/4; /* Ensure nice portrait format */
        }

        /* Hover effect: scales the image slightly larger */
        .shiva-image:hover {
            transform: scale(1.06);
            box-shadow: 0 0 45px rgba(251, 191, 36, 0.7), 0 0 90px rgba(251, 191, 36, 0.4);
        }

        /* 
         * RESPONSIVENESS 
         * Adjusting layout for mobile screens 
         */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .instructions-panel {
                padding: 1.5rem;
                margin-bottom: 2rem;
                border-radius: 15px;
            }

            .instructions-panel h1 {
                font-size: 2rem;
            }

            .instructions-list {
                padding-left: 1rem;
            }

            .shiva-image {
                max-width: 280px;
            }
        }

        /* Further adjustments for smaller phones (e.g., iPhone SE, standard Androids) */
        @media (max-width: 480px) {
            body {
                padding: 0.75rem;
            }
            
            .instructions-panel {
                padding: 1.25rem;
                margin-bottom: 1.5rem;
                border-radius: 12px;
            }

            .instructions-panel h1 {
                font-size: 1.7rem;
                margin-bottom: 0.75rem;
            }

            .instructions-panel p {
                font-size: 1rem;
                margin-bottom: 1.25rem;
            }

            .instructions-list li {
                font-size: 0.95rem;
                margin-bottom: 0.6rem;
            }

            .control-group label {
                font-size: 0.95rem;
            }

            .color-select {
                padding: 0.75rem 1.5rem;
                font-size: 1rem;
                width: 100%;
                max-width: 280px;
                min-width: unset;
            }

            .shiva-image {
                max-width: 230px;
                border-width: 3px;
            }
        }
        
        /* Subtle micro-animation for the background gradient */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        body {
            background-size: 200% 200%;
            animation: gradientShift 15s ease infinite;
        }
    </style>
</head>
<body>

    <!-- Instructions Panel -->
    <div class="instructions-panel">
        <h1>Divine Destiny</h1>
        <p>Seek your fortune through the cosmic blessings of Lord Shiva.</p>
        
        <ol class="instructions-list">
            <li>Pick a color from the dropdown below.</li>
            <li>Click Lord Shiva's image to visit a random destination.</li>
            <li>If that page features your color, you are blessed with luck!</li>
        </ol>

        <!-- Color Selection Dropdown -->
        <div class="control-group">
            <label for="colorPicker">Choose your wished color:</label>
            <select id="colorPicker" class="color-select">
                <option value="red">Red</option>
                <option value="blue">Blue</option>
                <option value="green">Green</option>
                <option value="yellow">Yellow</option>
                <option value="orange">Orange</option>
                <option value="purple">Purple</option>
            </select>
        </div>
    </div>

    <!-- Shiva Image Action -->
    <div class="shiva-image-container">
        <!-- The user can click this image to trigger the redirection -->
        <img 
            src="lord_shiva.png" 
            alt="Lord Shiva Meditating" 
            class="shiva-image" 
            id="shivaImage"
        >
    </div>

    <!-- Embedded JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Grab references to the interactive elements
            const shivaImage = document.getElementById('shivaImage');
            const colorPicker = document.getElementById('colorPicker');

            // Add click event listener to the Shiva image
            shivaImage.addEventListener('click', () => {
                // Get the currently chosen color from the dropdown
                const selectedColor = colorPicker.value;
                
                // Redirection URL placeholder as requested
                const baseUrl = 'https://omg10.com/4/11320549';
                
                // Construct the final URL with the color query parameter
                // We use encodeURIComponent to ensure the color value is safe for URLs
                const targetUrl = `${baseUrl}?color=${encodeURIComponent(selectedColor)}`;
                
                // Redirect the user to a new browser tab with the constructed URL
                window.open(targetUrl, '_blank');
            });
        });
    </script>
</body>
</html>
